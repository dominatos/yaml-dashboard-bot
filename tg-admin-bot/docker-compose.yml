version: '3.8'

services:
  tg-admin-bot:
    build: .
    container_name: tg-admin-bot
    restart: unless-stopped
    env_file:
      - .env
    volumes:
      # Mount the actual conf.yml file from the parent directory to the container
      # Important: this maps directly to /app/conf.yml
      - ../conf.yml:/app/conf.yml
    environment:
      - CONF_PATH=/app/conf.yml
